{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 font-weight-bold text-dark">Create Account</h3>
                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="username" class="form-label text-secondary small">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Pick a username" required autocomplete="off">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary small">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 shadow-sm">Sign Up</button>
                    <div class="text-center">
                        <span class="text-muted small">Already have an account?</span>
                        <a href="/login" class="text-decoration-none small ms-1">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
